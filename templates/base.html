<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>{% block title %}{{ site.title }}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <link rel="canonical" href="https://smntin.dev" />
    <link rel="alternate" type="application/atom+xml" href="/atom.xml" title="SmnTin's Bay">

    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="16x16 32x32 48x48" href="/assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
    <link rel="mask-icon" href="/assets/favicon/safari-pinned-tab.svg" color="#5bbad5" />

    <meta property="og:url" content="https://smntin.dev" />
    <meta property="og:site_name" content="SmnTin’s bay" />
    <meta property="og:type" content="website" />

    <script data-goatcounter="https://smntin.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="container">
      <header>
        <strong><a href="/" title="Home">SmnTin's Bay</a></strong>
        <nav>
          <small><a href="/blog">Blog</a></small>
          <small><a href="/atom.xml">Atom</a></small>
        </nav>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
